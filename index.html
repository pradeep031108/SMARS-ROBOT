<!DOCTYPE html>

<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SMARS BLE Test</title>
</head>

<body style="text-align:center; font-family:sans-serif;">

<h2>🤖 SMARS BLE CONTROL</h2>

<button onclick="connect()">CONNECT</button> <br><br>

<button onclick="send('F')">Forward</button> <button onclick="send('B')">Backward</button> <button onclick="send('L')">Left</button> <button onclick="send('R')">Right</button> <button onclick="send('S')">Stop</button>

<br><br>

<button onclick="send('M')">Manual Mode</button> <button onclick="send('O')">Obstacle Mode</button>

<p id="status">Not Connected</p>

<script>
let device, server, service, characteristic;

const SERVICE_UUID = "12345678-1234-1234-1234-1234567890ab";
const CHARACTERISTIC_UUID = "abcd1234-5678-1234-5678-abcdef123456";

async function connect() {
  try {
    device = await navigator.bluetooth.requestDevice({
      acceptAllDevices: true,
      optionalServices: [SERVICE_UUID]
    });

    server = await device.gatt.connect();
    service = await server.getPrimaryService(SERVICE_UUID);
    characteristic = await service.getCharacteristic(CHARACTERISTIC_UUID);

    document.getElementById("status").innerText = "Connected ✅";
  } catch (error) {
    console.log(error);
    alert("Connection Failed");
  }
}

function send(cmd) {
  if (!characteristic) {
    alert("Not connected");
    return;
  }

  let encoder = new TextEncoder();
  characteristic.writeValue(encoder.encode(cmd));
}
</script>

</body>
</html>
